<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gerenciador de Tarefas — MVC</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      color: #333;
      padding: 30px 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #2c3e50;
      font-size: 28px;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    /* Formulário */
    .formulario {
      background: #fff;
      padding: 24px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      margin-bottom: 30px;
    }

    .formulario h2 {
      margin-bottom: 16px;
      font-size: 18px;
      color: #555;
    }

    .formulario input,
    .formulario textarea {
      width: 100%;
      padding: 10px 14px;
      margin-bottom: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 15px;
    }

    .formulario textarea {
      height: 80px;
      resize: none;
    }

    .formulario button {
      width: 100%;
      padding: 12px;
      background: #3498db;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .formulario button:hover { background: #2980b9; }

    /* Lista */
    #lista-tarefas { display: flex; flex-direction: column; gap: 14px; }

    .tarefa {
      background: #fff;
      border-left: 5px solid #3498db;
      border-radius: 8px;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.07);
      transition: opacity 0.2s;
    }

    .tarefa.concluida {
      border-left-color: #2ecc71;
      opacity: 0.75;
    }

    .tarefa.concluida h3 {
      text-decoration: line-through;
      color: #999;
    }

    .tarefa-info h3 { font-size: 16px; margin-bottom: 4px; }
    .tarefa-info p  { font-size: 14px; color: #777; margin-bottom: 6px; }
    .status         { font-size: 13px; color: #555; }

    .tarefa-acoes { display: flex; flex-direction: column; gap: 8px; margin-left: 16px; }

    .btn-concluir, .btn-excluir {
      padding: 7px 14px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
    }

    .btn-concluir { background: #2ecc71; color: #fff; }
    .btn-concluir:hover { background: #27ae60; }

    .btn-excluir { background: #e74c3c; color: #fff; }
    .btn-excluir:hover { background: #c0392b; }

    .vazia { text-align: center; color: #aaa; font-size: 15px; padding: 20px; }
  </style>
</head>
<body>

  <div class="container">
    <h1>📋 Gerenciador de Tarefas</h1>

    <div class="formulario">
      <h2>Nova Tarefa</h2>
      <input type="text" id="titulo" placeholder="Título da tarefa" />
      <textarea id="descricao" placeholder="Descrição (opcional)"></textarea>
      <button onclick="controller.adicionar()">Adicionar Tarefa</button>
    </div>

    <div id="lista-tarefas"></div>
  </div>

  <!-- MODEL -->
  <script src="app/models/tasks.js"></script>
  <!-- VIEW -->
  <script src="app/views/view.js"></script>
  <!-- CONTROLLER -->
  <script src="app/controllers/controller.js"></script>
  <!-- FRONT CONTROLLER (inicialização) -->
  <script src="app.js"></script>

</body>
</html>
